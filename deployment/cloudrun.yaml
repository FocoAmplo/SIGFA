apiVersion: serving.knative.dev/v1
kind: Service

metadata:
  name: sigfa-api

spec:
  template:
    spec:
      containers:
        - image: IMAGE
          ports:
            - containerPort: 8080

          env:
            - name: PORT
              value: "8080"

          resources:
            limits:
              cpu: "1"
              memory: "512Mi"